  }
  .chapterbar button {
    font-family: var(--font-mono); font-size: 12px; color: var(--muted);

  .chapterbar button:hover { color: var(--ink); border-color: var(--muted); }
  .chapterbar button.on { color: var(--bg); background: var(--current); border-color: var(--current); }
  .legend { margin-left: auto; display: flex; gap: 14px; align-items: center; font-size: 12px; color: var(--muted); }

  .scene { display: none; }
  .scene.on { display: block; }
  svg { width: 100%; height: auto; max-height: 380px; display: block; margin: 8px auto 0; }

  .node .sub { fill: var(--muted); font-size: 10px; }
  .node .grouptick { stroke: var(--gc, var(--muted)); stroke-width: 3; }
  .node .vdot { fill: var(--gc, var(--muted)); display: none; }
  .node.visited .vdot { display: block; }
  .node:hover rect { fill: color-mix(in srgb, var(--gc, var(--muted)) 20%, var(--node-fill)); stroke: var(--muted); }
  .node:focus { outline: none; }
  .node:focus rect { stroke: var(--current); stroke-dasharray: 3 3; }
  .node.current rect { stroke: var(--current); stroke-width: 2.5; filter: drop-shadow(0 0 7px rgba(52,224,210,.4)); }
  .node.up rect   { stroke: var(--up); stroke-width: 2; }
  .node.down rect { stroke: var(--down); stroke-width: 2; }

  /* edges */
  .edge path { fill: none; stroke: var(--edge); stroke-width: 1.5; transition: opacity .18s, stroke .18s; }
  .edge text { fill: var(--muted); font-family: var(--font-mono); font-size: 10.5px; paint-order: stroke; stroke: var(--bg); stroke-width: 3px; }
  .edge.loop path { stroke-dasharray: 5 4; }
  .edge.up path   { stroke: var(--up); stroke-width: 2; }
  .edge.down path { stroke: var(--down); stroke-width: 2; }
  .edge.active path {

  @keyframes flow { to { stroke-dashoffset: -12; } }
  @media (prefers-reduced-motion: reduce) {

<script>
"use strict";
/* =====================================================================
   DATA — four scenes, one tour. Each scene: shape ('flow' | 'grid'),
   opening (worked-example focus on entry), nodes/edges/steps as in the
   interactive-explainer skill. TOUR steps name their scene.
   ===================================================================== */
const GROUPS = {
  idea:     { persona: { label: "Who",        color: "#9d8cff" },
              pack:    { label: "Which stack", color: "#34e0d2" },
              facts:   { label: "This repo",  color: "#f5b13d" } },
  team:     { core:    { label: "Core — always installed", color: "#34e0d2" },
              optin:   { label: "Opt-in",                  color: "#f5b13d" } },
  loop:     { design:  { label: "Design",   color: "#9d8cff" },
              build:   { label: "Build",    color: "#34e0d2" },
              gate:    { label: "Gate",     color: "#f5b13d" },
              compound:{ label: "Compound", color: "#46d39a" } },
  install:  { cli:     { label: "Deterministic — a script", color: "#34e0d2" },
              model:   { label: "Judgment — the model",     color: "#9d8cff" } },
};

const SCENES = [
  { id: "idea", title: "The idea", shape: "flow", opening: "packs",
    groups: GROUPS.idea,
    nodes: [
      { id: "personas", label: "14 personas", group: "persona", detail: "Voice, values, and decision discipline — the same files in every project. Edited once, in engsys, never per repo." },
      { id: "packs",    label: "Stack packs", group: "pack",    detail: "Capability is detachable: aws / azure / gcp / cloudflare, terraform / bicep / cdk, typescript / python / swift / kotlin, web / ios / android, prisma / mongo. Adapting a project means picking different packs — not editing a prompt. Mixed stacks compose." },
      { id: "repo",     label: "Your repo",   group: "facts",   detail: "The installer materializes .claude/ deterministically; /naturalize fills CLAUDE.md with project facts — services, invariants, toolchain. The one layer unique to you." },
    ],
    edges: [
      { from: "personas", to: "repo", label: "installed" },
      { from: "packs",    to: "repo", label: "selected" },
    ],
  },
  { id: "team", title: "The team", shape: "grid", opening: "isabelle", gridCols: 5,
    groups: GROUPS.team,
    nodes: [
      { id: "melvin",   label: "Melvin",   group: "core",  detail: "Cloud architect and performance scientist. Reasons about p99, blast radius, and cost curves before he picks a service." },
      { id: "aaron",    label: "Aaron",    group: "core",  detail: "IaC and deploys. Owns the pipeline, the state, and every 'it worked yesterday' infra mystery." },
      { id: "isabelle", label: "Isabelle", group: "core",  detail: "The implementer. Reads the spec, matches your patterns, tests her work, ships a clean PR." },
      { id: "bert",     label: "Bert",     group: "core",  detail: "Bug hunter. Traces the error to its real source and files the issue — he investigates, he doesn't guess." },
      { id: "jody",     label: "Jody",     group: "core",  detail: "Planner. Turns a goal into a dependency-mapped batch of issues Isabelle can actually work." },
      { id: "leith",    label: "Leith",    group: "core",  detail: "Product and UX. Turns 'make it better' into specs with acceptance criteria you can build against." },
      { id: "marcelo",  label: "Marcelo",  group: "core",  detail: "Testing. Designs the test plan and the quality gate before the bug ships, not after." },
      { id: "patricia", label: "Patricia", group: "core",  detail: "Librarian. Records the decision, writes the ADR, and keeps the docs from going stale." },
      { id: "nyx",      label: "Nyx",      group: "core",  detail: "Security. Asks 'is this actually secure?' — then breaks it to find out." },
      { id: "otto",     label: "Otto",     group: "core",  detail: "LLM optimization. Finds where your tokens are going and stops the bleeding." },
      { id: "gary",     label: "Gary",     group: "optin", detail: "Mobile architect — iOS and/or Android. Loads your mobile stack and sweats the native UX details." },
      { id: "sandy",    label: "Sandy",    group: "optin", detail: "Marketing and SEO. Makes skeptics understand — and want — what the engineers built. Clear over clever." },
      { id: "jos",      label: "Jos",      group: "optin", detail: "Monetization. Pricing, ASO, CAC/LTV math, and the App Store policy call before it bites you." },
      { id: "steve",    label: "Steve",    group: "optin", detail: "The scapegoat. Officially responsible for phantom config and IAM nobody admits creating. Not real — morale only." },
    ],
    edges: [],
  },
  { id: "loop", title: "The loop", shape: "flow", opening: "review",
    groups: GROUPS.loop,
    nodes: [
      { id: "goal",      label: "A goal",          group: "design",   detail: "One sentence from the operator. Everything downstream exists to turn it into merged code." },
      { id: "spec",      label: "Spec + plan",     group: "design",   detail: "Leith writes acceptance criteria; Melvin and Nyx pressure-test architecture and security; Marcelo adds the test plan. Four specialists argue before anyone codes." },
      { id: "board",     label: "Issue board",     group: "design",   detail: "Jody breaks the spec into dependency-ordered issues. One phase = one PR is decided here, not during coding." },
      { id: "implement", label: "Implement",       group: "build",    detail: "Isabelle works each issue in an isolated worktree, matching the repo's own patterns. The pre-push gate runs before anything leaves her branch." },
      { id: "review",    label: "Objective review", group: "gate",    detail: "A fresh reviewer with no stake in the code re-runs the whole gate. The verdict is binary: CLEAN, or findings with file:line." },
      { id: "merge",     label: "Merge",           group: "gate",     detail: "Nothing merges without a CLEAN verdict. Main stays releasable the whole project." },
      { id: "closeout",  label: "Closeout",        group: "compound", detail: "Worktrees cleaned, branches pruned — and every review finding mined for what it teaches." },
      { id: "lessons",   label: "Lessons library", group: "compound", detail: "Recurring findings are generalized into stack-independent lessons. The installer seeds them into every new project on day one." },
    ],
    edges: [
      { from: "goal",      to: "spec" },
      { from: "spec",      to: "board" },
      { from: "board",     to: "implement" },
      { from: "implement", to: "review", label: "phase PR" },
      { from: "review",    to: "merge",  label: "CLEAN" },
      { from: "review",    to: "implement", label: "findings", kind: "loop" },
      { from: "merge",     to: "closeout" },
      { from: "closeout",  to: "lessons" },
      { from: "lessons",   to: "goal",   label: "next project", kind: "loop" },
    ],
  },
  { id: "install", title: "Install", shape: "flow", opening: "install",
    groups: GROUPS.install,
    nodes: [
      { id: "get",        label: "npm i -g engsys", group: "cli",   detail: "Zero-dependency Node (≥18). Adds nothing to your project; same on macOS, Windows, Linux. Or clone the repo — you'll want it anyway, to fork packs and PR lessons back." },
      { id: "init",       label: "engsys init",     group: "cli",   detail: "Scaffolds the config. Pick cloud, iac, lang, platform, db, issue tracker, and which agents you want." },
      { id: "install",    label: "engsys install",  group: "cli",   detail: "A script — not a model — materializes .claude/, renders CLAUDE.md and settings, seeds the lessons library. Existing setup? It adopts and snapshots it, byte-for-byte reversible." },
      { id: "naturalize", label: "/naturalize",     group: "model", detail: "Open the project in Claude Code and run it: fills the project-facts region of CLAUDE.md, folds in imported Copilot/Cursor rules. The one model-driven step — judgment, never plumbing." },
      { id: "live",       label: "Live with it",    group: "cli",   detail: "verify catches drift against the lockfile; update pulls engsys improvements and re-renders; uninstall restores everything engsys touched." },
    ],
    edges: [
      { from: "get",        to: "init" },
      { from: "init",       to: "install" },
      { from: "install",    to: "naturalize" },
      { from: "naturalize", to: "live" },
      { from: "live",       to: "install", label: "update", kind: "loop" },
    ],
  },
];

const TOUR = [
  { scene: "idea",    title: "A team, not an assistant",  body: "engsys installs fourteen specialists into any repo with one command. Who they are never changes; what they work on is a pack you pick.", focus: ["personas", "packs", "repo"], edges: [["personas","repo"],["packs","repo"]] },
  { scene: "idea",    title: "Swap packs, not prompts",   body: "Same Melvin on AWS or Azure — the config decides which pack he loads. His persona file is untouched.", focus: ["packs"], edges: [["packs","repo"]] },
  { scene: "team",    title: "Design has names",          body: "Leith turns goals into specs with acceptance criteria. Jody turns specs into a dependency-ordered board.", focus: ["leith", "jody"] },
  { scene: "team",    title: "Build and guard",           body: "Isabelle implements to the board. Marcelo, Nyx, and Bert hold quality, security, and bugs to account.", focus: ["isabelle", "marcelo", "nyx", "bert"] },
  { scene: "team",    title: "Opt in to the rest",        body: "Gary for mobile, Sandy for the story, Jos for pricing, Steve for blame. Install only who you need.", focus: ["gary", "sandy", "jos", "steve"] },
  { scene: "loop",    title: "Design before code",        body: "Four specialists argue the spec into shape, then Jody's board makes the order the plan.", focus: ["goal", "spec", "board"], edges: [["goal","spec"],["spec","board"]] },
  { scene: "loop",    title: "One phase, one PR",         body: "Isabelle ships each phase from an isolated worktree, pre-gated before push.", focus: ["implement"], edges: [["board","implement"]] },
  { scene: "loop",    title: "A reviewer with no stake",  body: "Findings loop the phase back. CLEAN is the only door to merge.", focus: ["review", "implement"], edges: [["implement","review"],["review","implement"]] },
  { scene: "loop",    title: "The system compounds",      body: "Closeout mines every finding; lessons seed the next install. Each project starts smarter than the last.", focus: ["closeout", "lessons", "goal"], edges: [["merge","closeout"],["closeout","lessons"],["lessons","goal"]] },
  { scene: "install", title: "Two commands in",           body: "npm install -g engsys, then engsys init scaffolds your config.", focus: ["get", "init"], edges: [["get","init"]] },
  { scene: "install", title: "Script, then judgment",     body: "A script lays the plumbing faithfully, every time. The model only fills project facts — so nothing structural can be silently skipped.", focus: ["install", "naturalize"], edges: [["init","install"],["install","naturalize"]] },
  { scene: "install", title: "Your next project waits",   body: "verify, update, uninstall — reversible from day one. One command installs the whole team.", focus: ["live"], edges: [["naturalize","live"],["live","install"]] },
];

const LEGEND = [
  { label: "focused",       color: "var(--current)" },
  { label: "what it needs", color: "var(--up)" },
  { label: "what it feeds", color: "var(--down)" },
];

/* =====================================================================
   MACHINERY — multi-scene engine on the interactive-explainer starter.
   ===================================================================== */
const SVGNS = "http://www.w3.org/2000/svg";
const COL_W = 178, ROW_H = 70, NODE_H = 38, PAD = 30, GRID_W = 130, GRID_H = 62;

function el(tag, attrs, parent) {
  const e = document.createElementNS(SVGNS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(e);
  return e;
}

function buildScene(sc) {
  const nodes = sc.nodes, edges = sc.edges;
  const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
  const fwd = {}, rev = {};
  nodes.forEach(n => { fwd[n.id] = []; rev[n.id] = []; });
  edges.forEach(e => { if (e.kind === "loop") return; fwd[e.from].push(e.to); rev[e.to].push(e.from); });

  let W, H;
  if (sc.shape === "grid") {
    const colsN = sc.gridCols || 5;
    nodes.forEach((n, i) => {
      n.x = PAD + (i % colsN) * (GRID_W + 16);
      n.y = PAD + Math.floor(i / colsN) * GRID_H;
      n.w = GRID_W;
    });
    W = PAD * 2 + colsN * (GRID_W + 16) - 16;
    H = PAD * 2 + Math.ceil(nodes.length / colsN) * GRID_H - (GRID_H - NODE_H);
  } else {
    const rank = {};
    const rankOf = id => {
      if (id in rank) return rank[id];
      rank[id] = 0;
      rank[id] = rev[id].length ? Math.max(...rev[id].map(rankOf)) + 1 : 0;
      return rank[id];
    };
    nodes.forEach(n => rankOf(n.id));
    nodes.forEach(n => { if (typeof n.rank === "number") rank[n.id] = n.rank; });
    const cols = [];
    nodes.forEach(n => (cols[rank[n.id]] = cols[rank[n.id]] || []).push(n));
    const maxRows = Math.max(...cols.map(c => c.length));
    cols.forEach((col, r) => {
      if (r > 0) col.sort((a, b) => avgRow(a) - avgRow(b));
      col.forEach((n, i) => {
        n.x = PAD + r * COL_W;
        n.y = PAD + (maxRows - col.length) * ROW_H / 2 + i * ROW_H;
        n.w = Math.max(92, n.label.length * 7.2 + 26);
      });
      function avgRow(n) {
        const rows = rev[n.id].map(p => cols[rank[p]] ? cols[rank[p]].indexOf(byId[p]) : 0);
        return rows.length ? rows.reduce((s, v) => s + v, 0) / rows.length : 0;
      }
    });
    W = PAD * 2 + (cols.length - 1) * COL_W + Math.max(...nodes.map(n => n.w));
    const loopCount = edges.filter(e => e.kind === "loop").length;
    const loopBase = PAD + maxRows * ROW_H;
    H = loopCount ? loopBase + 26 + loopCount * 22 + 8 : PAD * 2 + maxRows * ROW_H - (ROW_H - NODE_H);
    sc._loopBase = loopBase;
  }

  const div = document.createElement("div");
  div.className = "scene"; div.id = "scene-" + sc.id;
  document.getElementById("stage").appendChild(div);
  const svg = el("svg", { viewBox: `0 0 ${W} ${H}`, role: "group", "aria-label": sc.title });
  div.appendChild(svg);

  const defs = el("defs", {}, svg);
  for (const [name, color] of [["default", "var(--edge)"], ["up", "var(--up)"], ["down", "var(--down)"], ["active", "var(--current)"]]) {
    const m = el("marker", { id: `arr-${sc.id}-${name}`, viewBox: "0 0 8 8", refX: 7, refY: 4, markerWidth: 7, markerHeight: 7, orient: "auto-start-reverse" }, defs);
    el("path", { d: "M0,0.5 L7.5,4 L0,7.5 z", fill: color }, m);
  }

  let loopIdx = 0;
  const edgeEls = edges.map(e => {
    const a = byId[e.from], b = byId[e.to];
    const g = el("g", { class: "edge" + (e.kind ? " " + e.kind : "") }, svg);
    let d, lx, ly;
    if (e.kind === "loop") {
      const x1 = a.x + a.w / 2, y1 = a.y + NODE_H, x2 = b.x + b.w / 2, y2 = b.y + NODE_H;
      const dip = sc._loopBase + 26 + loopIdx++ * 22;
      d = `M ${x1} ${y1} C ${x1} ${dip}, ${x2} ${dip}, ${x2} ${y2 + 4}`;
      lx = (x1 + x2) / 2; ly = dip - 8;
    } else {
      const x1 = a.x + a.w, y1 = a.y + NODE_H / 2, x2 = b.x, y2 = b.y + NODE_H / 2;
      const mx = (x1 + x2) / 2;
      d = `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2 - 3} ${y2}`;
      lx = mx; ly = (y1 + y2) / 2 - 7;
    }
    const path = el("path", { d, "marker-end": `url(#arr-${sc.id}-default)` }, g);
    if (e.label) {
      const t = el("text", { x: lx, y: ly, "text-anchor": "middle" }, g);
      t.textContent = e.label;
    }
    return { e, g, path };
  });

  const nodeEls = nodes.map(n => {
    const grp = sc.groups[n.group];
    const g = el("g", { class: "node", tabindex: 0, role: "button",
      "aria-label": n.label + (grp ? " (" + grp.label + ")" : "") }, svg);
    if (grp && grp.color) g.setAttribute("style", "--gc:" + grp.color);
    el("rect", { x: n.x, y: n.y, width: n.w, height: NODE_H, rx: 8 }, g);
    el("line", { x1: n.x, y1: n.y + 8, x2: n.x, y2: n.y + NODE_H - 8, class: "grouptick" }, g);
    el("circle", { cx: n.x + n.w - 7, cy: n.y + 7, r: 2.5, class: "vdot" }, g);
    const t = el("text", { x: n.x + n.w / 2, y: n.y + NODE_H / 2 + 4.5, "text-anchor": "middle" }, g);
    t.textContent = n.label;
    g.addEventListener("click", () => focusNode(sc, n.id));
    g.addEventListener("keydown", ev => { if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); focusNode(sc, n.id); } });
    return { n, g };
  });

  sc.byId = byId; sc.fwd = fwd; sc.rev = rev;
  sc.nodeEls = nodeEls; sc.edgeEls = edgeEls; sc.div = div;
}

SCENES.forEach(buildScene);

/* ---- chapter bar, legend, panel ---- */
const chapterBar = document.getElementById("chapters");
const legendEl = document.getElementById("legend");
SCENES.forEach((sc, i) => {
  const b = document.createElement("button");
  b.textContent = (i + 1) + " · " + sc.title;
  b.addEventListener("click", () => { pauseTourIfRunning(); showScene(sc.id); focusNode(sc, sc.opening, true); });
  chapterBar.insertBefore(b, legendEl);
  sc.tab = b;
});
legendEl.innerHTML = LEGEND.map(l => `<span style="--c:${l.color}">${l.label}</span>`).join("");

const panel = document.getElementById("panel");
const resetBtn = document.getElementById("reset");
const prevBtn = document.getElementById("prev"), nextBtn = document.getElementById("next");
const countEl = document.getElementById("count"), dotsEl = document.getElementById("dots");

TOUR.forEach((s, i) => {
  const b = document.createElement("button");
  b.title = s.title; b.setAttribute("aria-label", "Step " + (i + 1) + ": " + s.title);
  b.addEventListener("click", () => showStep(i));
  dotsEl.appendChild(b);
});

function showPanel(title, body, hint) {
  panel.innerHTML = "";
  const h = document.createElement("h2"); h.textContent = title; panel.appendChild(h);
  const p = document.createElement("p"); p.textContent = body; panel.appendChild(p);
  if (hint) { const s = document.createElement("p"); s.className = "hint"; s.textContent = hint; panel.appendChild(s); }
}

/* ---- state ---- */
let stepIndex = -1, pausedStep = -1, activeScene = SCENES[0], focusedId = null;
const visited = new Set();   // "sceneId:nodeId"

function sceneById(id) { return SCENES.find(s => s.id === id); }

function showScene(id) {
  activeScene = sceneById(id);
  SCENES.forEach(sc => {
    sc.div.classList.toggle("on", sc === activeScene);
    sc.tab.classList.toggle("on", sc === activeScene);
  });
}

function reach(sc, start, adj) {
  const seen = new Set(), q = [...adj[start]];
  while (q.length) { const id = q.shift(); if (seen.has(id)) continue; seen.add(id); q.push(...adj[id]); }
  return seen;
}

function apply(sc, current, up, down, activePairs) {
  const any = current.size || activePairs.size;
  sc.nodeEls.forEach(({ n, g }) => {
    g.classList.toggle("current", current.has(n.id));
    g.classList.toggle("up", up.has(n.id));
    g.classList.toggle("down", down.has(n.id));
    g.classList.toggle("visited", visited.has(sc.id + ":" + n.id));
    g.classList.toggle("dim", any && !current.has(n.id) && !up.has(n.id) && !down.has(n.id));
  });
  sc.edgeEls.forEach(({ e, g, path }) => {
    const key = e.from + ">" + e.to;
    const isActive = activePairs.has(key);
    const isUp = up.size && (up.has(e.from) && (up.has(e.to) || current.has(e.to))) && e.kind !== "loop";
    const isDown = down.size && ((current.has(e.from) || down.has(e.from)) && down.has(e.to)) && e.kind !== "loop";
    g.classList.toggle("active", isActive);
    g.classList.toggle("up", !isActive && isUp);
    g.classList.toggle("down", !isActive && isDown);
    g.classList.toggle("dim", any && !isActive && !isUp && !isDown);
    path.setAttribute("marker-end", `url(#arr-${sc.id}-${isActive ? "active" : isUp ? "up" : isDown ? "down" : "default"})`);
  });
  resetBtn.hidden = activeScene === SCENES[0] && focusedId === SCENES[0].opening && stepIndex === -1 && pausedStep < 0;
}

function pauseTourIfRunning() { if (stepIndex >= 0) { pausedStep = stepIndex; stepIndex = -1; } }

function focusNode(sc, id, fromTab) {
  if (!fromTab) pauseTourIfRunning();          // leaving the tour pauses it — never destroys it
  showScene(sc.id);
  focusedId = id; visited.add(sc.id + ":" + id);
  const up = reach(sc, id, sc.rev), down = reach(sc, id, sc.fwd);
  apply(sc, new Set([id]), up, down, new Set());
  const n = sc.byId[id];
  const grp = sc.groups[n.group];
  showPanel(n.label, n.detail || "", grp ? grp.label : "");
  syncStepper();
}

function showStep(i) {
  stepIndex = i; pausedStep = -1; focusedId = null;
  const s = TOUR[i];
  const sc = sceneById(s.scene);
  showScene(sc.id);
  (s.focus || []).forEach(id => visited.add(sc.id + ":" + id));
  SCENES.forEach(other => { if (other !== sc) apply(other, new Set(), new Set(), new Set(), new Set()); });
  apply(sc, new Set(s.focus || []), new Set(), new Set(), new Set((s.edges || []).map(p => p[0] + ">" + p[1])));
  showPanel(s.title, s.body);
  syncStepper();
}

function resetAll() {
  stepIndex = -1; pausedStep = -1; visited.clear();
  SCENES.forEach(sc => apply(sc, new Set(), new Set(), new Set(), new Set()));
  showScene(SCENES[0].id);
  focusNode(SCENES[0], SCENES[0].opening, true);   // open on a worked example, never a blank slate
}

function syncStepper() {
  prevBtn.disabled = stepIndex <= 0;
  nextBtn.disabled = stepIndex >= TOUR.length - 1;
  nextBtn.textContent = stepIndex >= 0 ? "Next →"
    : pausedStep >= 0 ? "Resume step " + (pausedStep + 1) + " →"
    : "Start the tour →";
  countEl.textContent = stepIndex >= 0 ? (stepIndex + 1) + " / " + TOUR.length
    : pausedStep >= 0 ? "paused " + (pausedStep + 1) + " / " + TOUR.length
    : TOUR.length + " steps";
  [...dotsEl.children].forEach((d, i) => d.classList.toggle("on", stepIndex >= 0 ? i <= stepIndex : pausedStep >= 0 && i <= pausedStep));
}

function advance() {
  if (stepIndex === -1) showStep(pausedStep >= 0 ? pausedStep : 0);
  else if (stepIndex < TOUR.length - 1) showStep(stepIndex + 1);
}
prevBtn.addEventListener("click", () => { if (stepIndex > 0) showStep(stepIndex - 1); });
nextBtn.addEventListener("click", advance);
resetBtn.addEventListener("click", resetAll);
document.addEventListener("keydown", ev => {
  if (ev.key === "Escape") resetAll();
  else if (ev.key === "ArrowRight") advance();
  else if (ev.key === "ArrowLeft" && stepIndex > 0) showStep(stepIndex - 1);
});
document.getElementById("copy").addEventListener("click", function () {
  if (navigator.clipboard) navigator.clipboard.writeText("engsys install --into .");
  this.textContent = "copied"; setTimeout(() => this.textContent = "copy", 1200);
});

resetAll();
</script>

  "Stop using AI to write code."          → contrarian hero needs the scroll page's room; here the diagram argues it
  "Fourteen specialists. One install."    → the team grid shows it
  "kept ruthlessly separate"              → adverb doing a mechanism's job
  footer link "Prefer the full tour?"     → v3 is not a companion; it carries the whole story
