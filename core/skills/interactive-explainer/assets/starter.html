<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>How a change ships</title>
<style>
  /* ---- tokens: restyle the aesthetic here, nowhere else ---- */
  :root {
    --bg: #10151a;
    --panel: #171f27;
    --ink: #e8e3d8;
    --muted: #8b95a1;
    --line: #2b333c;
    --node-fill: #1b232c;
    --node-stroke: #3a444f;
    --current: #ffd166;   /* focused node */
    --up: #e07a5f;        /* upstream: what it needs */
    --down: #4cc9f0;      /* downstream: what it feeds */
    --fail: #e5484d;
    --edge: #55606c;
    --font-ui: "Avenir Next", "Segoe UI", "Helvetica Neue", sans-serif;
    --font-display: Charter, Georgia, serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font-family: var(--font-ui); font-size: 15px; line-height: 1.45;
  }
  header {
    display: flex; flex-wrap: wrap; align-items: baseline; gap: 4px 16px;
    padding: 20px 24px 8px;
  }
  h1 { font-family: var(--font-display); font-size: 26px; font-weight: 600; margin: 0; }
  .question { color: var(--muted); margin: 0; font-style: italic; }
  .legend { margin-left: auto; display: flex; gap: 14px; align-items: center; font-size: 12px; color: var(--muted); }
  .legend span::before {
    content: ""; display: inline-block; width: 10px; height: 10px;
    border-radius: 2px; margin-right: 5px; vertical-align: -1px; background: var(--c);
  }
  main { display: grid; grid-template-columns: 1fr 320px; gap: 0 16px; padding: 8px 24px 24px; }
  #stage { min-width: 0; }
  svg { width: 100%; height: auto; display: block; }

  /* nodes */
  .node { cursor: pointer; }
  .node rect {
    fill: var(--node-fill); stroke: var(--node-stroke); stroke-width: 1.5; rx: 8;
    transition: opacity .18s, stroke .18s;
  }
  .node text { fill: var(--ink); font-family: var(--font-ui); font-size: 13px; pointer-events: none; }
  .node .grouptick { stroke-width: 3; }
  .node:hover rect { stroke: var(--muted); }
  .node:focus { outline: none; }
  .node:focus rect { stroke: var(--current); stroke-dasharray: 3 3; }
  .node.current rect { stroke: var(--current); stroke-width: 2.5; filter: drop-shadow(0 0 6px rgba(255,209,102,.45)); }
  .node.up rect   { stroke: var(--up); stroke-width: 2; }
  .node.down rect { stroke: var(--down); stroke-width: 2; }
  .node.dim { opacity: .25; }

  /* edges */
  .edge path { fill: none; stroke: var(--edge); stroke-width: 1.5; transition: opacity .18s, stroke .18s; }
  .edge text { fill: var(--muted); font-size: 11px; }
  .edge.loop path { stroke-dasharray: 5 4; }
  .edge.fail path { stroke-dasharray: 2 4; stroke: color-mix(in srgb, var(--fail) 65%, var(--edge)); }
  .edge.up path   { stroke: var(--up); stroke-width: 2; }
  .edge.down path { stroke: var(--down); stroke-width: 2; }
  .edge.active path {
    stroke: var(--current); stroke-width: 2;
    stroke-dasharray: 6 6; animation: flow 1s linear infinite;
  }
  .edge.dim { opacity: .15; }
  @keyframes flow { to { stroke-dashoffset: -12; } }
  @media (prefers-reduced-motion: reduce) {
    .edge.active path { animation: none; stroke-dasharray: none; }
    .node rect, .edge path { transition: none; }
  }

  /* panel */
  aside {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 16px; align-self: start; position: sticky; top: 12px;
    display: flex; flex-direction: column; gap: 10px;
  }
  #panel h2 { font-family: var(--font-display); font-size: 17px; margin: 0 0 6px; }
  #panel p { margin: 0; color: var(--ink); }
  #panel .hint { color: var(--muted); font-size: 13px; }
  .stepper { display: flex; align-items: center; gap: 10px; border-top: 1px solid var(--line); padding-top: 10px; }
  .stepper button {
    background: none; border: 1px solid var(--line); color: var(--ink);
    border-radius: 6px; padding: 5px 12px; cursor: pointer; font: inherit; font-size: 13px;
  }
  .stepper button:hover:not(:disabled) { border-color: var(--current); }
  .stepper button:disabled { opacity: .35; cursor: default; }
  .stepper .count { color: var(--muted); font-size: 12px; margin-left: auto; }
  #reset {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font: inherit; font-size: 12px; text-decoration: underline; padding: 0; align-self: flex-start;
  }
  kbd {
    background: var(--node-fill); border: 1px solid var(--line); border-radius: 4px;
    padding: 0 5px; font-size: 11px; font-family: inherit;
  }
  @media (max-width: 720px) {
    main { grid-template-columns: 1fr; }
    aside { position: static; }
    .legend { margin-left: 0; flex-wrap: wrap; }
    /* deep graphs: scroll the diagram, never shrink labels below legibility */
    #stage { overflow-x: auto; }
    #stage svg { min-width: 560px; }
  }
</style>
</head>
<body>
<header>
  <h1 id="title"></h1>
  <p class="question" id="question"></p>
  <div class="legend" id="legend"></div>
</header>
<main>
  <div id="stage"></div>
  <aside>
    <div id="panel" aria-live="polite"></div>
    <button id="reset" hidden>Reset (Esc)</button>
    <div class="stepper">
      <button id="prev" aria-label="Previous step">&#8592; Prev</button>
      <button id="next" aria-label="Next step">Next &#8594;</button>
      <span class="count" id="count"></span>
    </div>
  </aside>
</main>

<script>
"use strict";
/* =====================================================================
   DATA — the only section you edit for a new explainer.
   nodes: id, label (≤3 words), group, detail (≤3 sentences of mechanism)
   edges: from, to, label? (≤3 words), kind?: 'loop' (back-edge, excluded
          from ranking + ancestry) | 'fail' (failure path, drawn muted)
   steps: title (≤6 words), body (≤2 sentences), focus [node ids],
          edges? [[from,to], ...] to animate
   ===================================================================== */
const EXPLAINER = {
  title: "How a change ships",
  question: "What happens between git push and production?",
  groups: {
    dev:  { label: "Developer" },
    ci:   { label: "CI" },
    prod: { label: "Production" },
  },
  nodes: [
    { id: "edit",     label: "Edit code",      group: "dev",  detail: "A change starts on a branch. Nothing here can touch main directly." },
    { id: "push",     label: "Push branch",    group: "dev",  detail: "Pushing opens or updates the PR. From here on, automation and reviewers take over." },
    { id: "ci",       label: "CI: build + test", group: "ci", detail: "CI blocks the merge until the build and the full test suite pass. A red build stops everything downstream." },
    { id: "review",   label: "Code review",    group: "dev",  detail: "A human gates the merge. Requested changes send the branch back to editing — that loop is the point, not a detour." },
    { id: "merge",    label: "Merge to main",  group: "ci",   detail: "Main is always releasable. The merge commit is what every later stage deploys." },
    { id: "canary",   label: "Deploy canary",  group: "prod", detail: "The merge deploys to a small slice of traffic first. Blast radius is capped." },
    { id: "metrics",  label: "Watch metrics",  group: "prod", detail: "Error rate and latency on the canary decide the rollout. Numbers promote the change — nobody clicks 'looks good'." },
    { id: "rollback", label: "Rollback",       group: "prod", detail: "A regression rolls the canary back to the previous merge within minutes, then the fix starts as a new change." },
  ],
  edges: [
    { from: "edit",    to: "push" },
    { from: "push",    to: "ci" },
    { from: "ci",      to: "review", label: "passed" },
    { from: "review",  to: "merge",  label: "approved" },
    { from: "merge",   to: "canary" },
    { from: "canary",  to: "metrics" },
    { from: "review",  to: "edit",   label: "changes requested", kind: "loop" },
    { from: "metrics", to: "rollback", label: "regression", kind: "fail" },
    { from: "rollback", to: "edit",  label: "new change", kind: "loop" },
  ],
  steps: [
    { title: "A branch, never main",   body: "Work happens on a branch and gets pushed. Main stays releasable the whole time.", focus: ["edit", "push"], edges: [["edit","push"]] },
    { title: "CI gates the merge",     body: "Build and tests must pass before a human even looks. Red build, no review.", focus: ["ci"], edges: [["push","ci"]] },
    { title: "Review loops back",      body: "The branch loops back until approved.", focus: ["review", "edit"], edges: [["review","edit"]] },
    { title: "Merge deploys a canary", body: "The canary takes real traffic before anyone else does.", focus: ["merge", "canary"], edges: [["review","merge"],["merge","canary"]] },
    { title: "Metrics decide",         body: "Canary numbers promote the change or trigger rollback. A regression becomes a new change — the cycle restarts.", focus: ["metrics", "rollback"], edges: [["metrics","rollback"],["rollback","edit"]] },
  ],
  legend: [
    { label: "focused",       color: "var(--current)" },
    { label: "what it needs", color: "var(--up)" },
    { label: "what it feeds", color: "var(--down)" },
  ],
};

/* =====================================================================
   MACHINERY — layout, render, interactions. Rarely needs editing.
   ===================================================================== */
const SVGNS = "http://www.w3.org/2000/svg";
const COL_W = 175, ROW_H = 70, NODE_H = 38, PAD = 30;

const nodes = EXPLAINER.nodes, edges = EXPLAINER.edges, steps = EXPLAINER.steps || [];
const byId = Object.fromEntries(nodes.map(n => [n.id, n]));
const fwd = {}, rev = {};                    // adjacency, loop edges excluded
nodes.forEach(n => { fwd[n.id] = []; rev[n.id] = []; });
edges.forEach(e => { if (e.kind === "loop") return; fwd[e.from].push(e.to); rev[e.to].push(e.from); });

/* ---- layout: longest-path ranks, one barycenter pass, positions ---- */
const rank = {};
function rankOf(id) {
  if (id in rank) return rank[id];
  rank[id] = 0; // cycle guard: accidental cycles rank as sources instead of recursing forever
  rank[id] = rev[id].length ? Math.max(...rev[id].map(rankOf)) + 1 : 0;
  return rank[id];
}
nodes.forEach(n => rankOf(n.id));
nodes.forEach(n => { if (typeof n.rank === "number") rank[n.id] = n.rank; }); // manual override

const cols = [];
nodes.forEach(n => (cols[rank[n.id]] = cols[rank[n.id]] || []).push(n));
const maxRows = Math.max(...cols.map(c => c.length));
cols.forEach((col, r) => {                   // barycenter: order by avg predecessor row
  if (r > 0) col.sort((a, b) => avgRow(a) - avgRow(b));
  col.forEach((n, i) => {
    n.x = PAD + r * COL_W;
    n.y = PAD + (maxRows - col.length) * ROW_H / 2 + i * ROW_H;
    n.w = Math.max(92, n.label.length * 7.2 + 26);
  });
  function avgRow(n) {
    const rows = rev[n.id].map(p => cols[rank[p]] ? cols[rank[p]].indexOf(byId[p]) : 0);
    return rows.length ? rows.reduce((s, v) => s + v, 0) / rows.length : 0;
  }
});
const W = PAD * 2 + (cols.length - 1) * COL_W + Math.max(...nodes.map(n => n.w));
const H = PAD * 2 + maxRows * ROW_H + 30;    // +30 for loop arcs below

/* ---- render ---- */
function el(tag, attrs, parent) {
  const e = document.createElementNS(SVGNS, tag);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(e);
  return e;
}
const svg = el("svg", { viewBox: `0 0 ${W} ${H}`, role: "group", "aria-label": EXPLAINER.title });
document.getElementById("stage").appendChild(svg);

const defs = el("defs", {}, svg);
for (const [name, color] of [["default", "var(--edge)"], ["up", "var(--up)"], ["down", "var(--down)"], ["active", "var(--current)"], ["fail", "var(--fail)"]]) {
  const m = el("marker", { id: "arr-" + name, viewBox: "0 0 8 8", refX: 7, refY: 4, markerWidth: 7, markerHeight: 7, orient: "auto-start-reverse" }, defs);
  el("path", { d: "M0,0.5 L7.5,4 L0,7.5 z", fill: color }, m);
}

const edgeEls = edges.map(e => {
  const a = byId[e.from], b = byId[e.to];
  const g = el("g", { class: "edge" + (e.kind ? " " + e.kind : "") }, svg);
  let d, lx, ly;
  if (e.kind === "loop") {                   // back-edge: arc underneath
    const x1 = a.x + a.w / 2, y1 = a.y + NODE_H, x2 = b.x + b.w / 2, y2 = b.y + NODE_H;
    const dip = H - PAD / 2;
    d = `M ${x1} ${y1} C ${x1} ${dip}, ${x2} ${dip}, ${x2} ${y2 + 4}`;
    lx = (x1 + x2) / 2; ly = dip - ((x1+x2)/2 % 2 ? 22 : 8); // stagger stacked loop labels
  } else {
    const x1 = a.x + a.w, y1 = a.y + NODE_H / 2, x2 = b.x, y2 = b.y + NODE_H / 2;
    const mx = (x1 + x2) / 2;
    d = `M ${x1} ${y1} C ${mx} ${y1}, ${mx} ${y2}, ${x2 - 3} ${y2}`;
    lx = mx; ly = (y1 + y2) / 2 - 7;
  }
  const path = el("path", { d, "marker-end": "url(#arr-" + (e.kind === "fail" ? "fail" : "default") + ")" }, g);
  if (e.label) {
    const t = el("text", { x: lx, y: ly, "text-anchor": "middle" }, g);
    t.textContent = e.label;
  }
  return { e, g, path };
});

const nodeEls = nodes.map(n => {
  const g = el("g", { class: "node", tabindex: 0, role: "button",
    "aria-label": n.label + (EXPLAINER.groups[n.group] ? " (" + EXPLAINER.groups[n.group].label + ")" : "") }, svg);
  el("rect", { x: n.x, y: n.y, width: n.w, height: NODE_H, rx: 8 }, g);
  el("line", { x1: n.x, y1: n.y + 8, x2: n.x, y2: n.y + NODE_H - 8, class: "grouptick", stroke: "var(--muted)" }, g);
  const t = el("text", { x: n.x + n.w / 2, y: n.y + NODE_H / 2 + 4.5, "text-anchor": "middle" }, g);
  t.textContent = n.label;
  g.addEventListener("click", () => focusNode(n.id));
  g.addEventListener("keydown", ev => { if (ev.key === "Enter" || ev.key === " ") { ev.preventDefault(); focusNode(n.id); } });
  return { n, g };
});

/* ---- header, legend, panel ---- */
document.getElementById("title").textContent = EXPLAINER.title;
document.title = EXPLAINER.title;
document.getElementById("question").textContent = EXPLAINER.question;
document.getElementById("legend").innerHTML =
  (EXPLAINER.legend || []).map(l => `<span style="--c:${l.color}">${l.label}</span>`).join("");

const panel = document.getElementById("panel");
const resetBtn = document.getElementById("reset");
const prevBtn = document.getElementById("prev"), nextBtn = document.getElementById("next");
const countEl = document.getElementById("count");

function showPanel(title, body, hint) {
  panel.innerHTML = "";
  const h = document.createElement("h2"); h.textContent = title; panel.appendChild(h);
  const p = document.createElement("p"); p.textContent = body; panel.appendChild(p);
  if (hint) { const s = document.createElement("p"); s.className = "hint"; s.innerHTML = hint; panel.appendChild(s); }
}

/* ---- state ---- */
let stepIndex = -1, focused = null;

function reach(start, adj) {                 // BFS over fwd or rev adjacency
  const seen = new Set(), q = [...adj[start]];
  while (q.length) { const id = q.shift(); if (seen.has(id)) continue; seen.add(id); q.push(...adj[id]); }
  return seen;
}

function apply(current, up, down, activePairs) {
  const any = current.size || activePairs.size;
  nodeEls.forEach(({ n, g }) => {
    g.classList.toggle("current", current.has(n.id));
    g.classList.toggle("up", up.has(n.id));
    g.classList.toggle("down", down.has(n.id));
    g.classList.toggle("dim", any && !current.has(n.id) && !up.has(n.id) && !down.has(n.id));
  });
  edgeEls.forEach(({ e, g, path }) => {
    const key = e.from + ">" + e.to;
    const isActive = activePairs.has(key);
    const isUp = up.size && (up.has(e.from) && (up.has(e.to) || current.has(e.to))) && e.kind !== "loop";
    const isDown = down.size && ((current.has(e.from) || down.has(e.from)) && down.has(e.to)) && e.kind !== "loop";
    g.classList.toggle("active", isActive);
    g.classList.toggle("up", !isActive && isUp);
    g.classList.toggle("down", !isActive && isDown);
    g.classList.toggle("dim", any && !isActive && !isUp && !isDown);
    path.setAttribute("marker-end", "url(#arr-" + (isActive ? "active" : isUp ? "up" : isDown ? "down" : e.kind === "fail" ? "fail" : "default") + ")");
  });
  resetBtn.hidden = !any;
}

function focusNode(id) {
  stepIndex = -1; focused = id;
  const up = reach(id, rev), down = reach(id, fwd);
  apply(new Set([id]), up, down, new Set());
  const n = byId[id];
  const grp = EXPLAINER.groups[n.group];
  showPanel(n.label, n.detail || "", grp ? grp.label : "");
  syncStepper();
}

function showStep(i) {
  stepIndex = i; focused = null;
  const s = steps[i];
  apply(new Set(s.focus || []), new Set(), new Set(), new Set((s.edges || []).map(p => p[0] + ">" + p[1])));
  showPanel(s.title, s.body);
  syncStepper();
}

function resetAll() {
  stepIndex = -1; focused = null;
  apply(new Set(), new Set(), new Set(), new Set());
  showPanel(EXPLAINER.title, EXPLAINER.question,
    "Click any node to trace what it needs and what it feeds. <kbd>&#8592;</kbd><kbd>&#8594;</kbd> step through, <kbd>Esc</kbd> reset.");
  syncStepper();
}

function syncStepper() {
  prevBtn.disabled = stepIndex <= 0 && stepIndex !== -1 || !steps.length;
  nextBtn.disabled = stepIndex >= steps.length - 1;
  countEl.textContent = steps.length ? (stepIndex === -1 ? steps.length + " steps" : (stepIndex + 1) + " / " + steps.length) : "";
}

prevBtn.addEventListener("click", () => { if (stepIndex > 0) showStep(stepIndex - 1); });
nextBtn.addEventListener("click", () => { if (stepIndex < steps.length - 1) showStep(stepIndex + 1); });
resetBtn.addEventListener("click", resetAll);
document.addEventListener("keydown", ev => {
  if (ev.key === "Escape") resetAll();
  else if (ev.key === "ArrowRight" && stepIndex < steps.length - 1) showStep(stepIndex + 1);
  else if (ev.key === "ArrowLeft" && stepIndex > 0) showStep(stepIndex - 1);
});

resetAll();
</script>

<!-- graveyard:
  "This is the last purely local moment."           → mood, not mechanism
  "Blast radius is capped by design."               → "by design" is filler
  edge "fix as new change"                          → over the 3-word budget
  "Requested changes return the branch to editing." → captioned the labeled arrow
-->
</body>
</html>
